<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRADUATION'S LETTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ELEMEN AUDIO: Menggunakan format mpeg dan diset loop agar mengulang otomatis -->
    <audio id="envelopeAudio" loop>
        <source src="graduation-music.mpeg" type="audio/mpeg">
    </audio>

    <div class="envelope-container" id="envelopeWrapper">
        <div class="envelope-box">
            
            <div class="letter" id="letterCard">
                <div class="letter-photo">
                    <img src="foto-teman.jpeg" alt="Our Memories">
                </div>
                
                <div class="letter-text-area">
                    <h3>NEVERENDING HAPPINESS</h3>
                    <p class="greeting">Dear Friends,</p>
                    <p class="message">
                       Wisuda bukanlah akhir perjalanan, melainkan awal dari petualangan baru. selamat dan semoga sukses selalu
                    </p>
                    <span class="sparkle">✦ 2026 ✦</span>
                </div>

                <a href="memento.html" class="memento-box">
                    <img src="gambar-memento.jpeg" alt="Memento Icon" class="memento-img">
                    <span class="memento-title">Visit Memento ➔</span>
                </a>
            </div>

            <img src="envelope-closed.png" alt="Envelope" id="envelopeImg" class="envelope-main-img">
            
        </div>
    </div>

    <script>
        const wrapper = document.getElementById('envelopeWrapper');
        const img = document.getElementById('envelopeImg');
        const audio = document.getElementById('envelopeAudio'); // Mengambil elemen audio

        wrapper.addEventListener('click', (e) => {
            // Biar kalau tombol memento diklik, amplopnya nggak ikut ketutup otomatis
            if (e.target.closest('.memento-box')) return;

            if (!wrapper.classList.contains('open')) {
                wrapper.classList.add('open');
                
                // MAININ SOUND: Berputar lancar saat amplop pertama kali ditekan
                audio.play().catch(error => {
                    console.log("Autoplay diblokir browser sampai ada interaksi klik:", error);
                });

                setTimeout(() => { 
                    img.src = 'envelope-open.png'; // Diubah ke .png
                }, 150);
            } else {
                wrapper.classList.remove('open');
                
                // JIKA INGIN SOUND BERHENTI SAAT AMPLOP DITUTUP KEMBALI:
                // Hapus tanda garis miring (//) pada baris di bawah ini:
                // audio.pause();

                setTimeout(() => { 
                    img.src = 'envelope-closed.png'; // Diubah ke .png
                }, 150);
            }
        });
    </script>
</body>
</html>
